version: 1

models:
  - name: contact
    columns:
      - name: uuid
        constraints:
          - type: unique
        tests:
          - not_null
  - name: person
    columns:
      - name: uuid
        tests:
          - not_null
        constraints:
          - type: foreign_key
            expression: "contact (uuid) ON DELETE CASCADE"
  - name: place
    columns:
      - name: uuid
        tests:
          - not_null
