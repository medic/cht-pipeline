version: 1

models:
  - name: contact
    columns:
      - name: uuid
        constraints:
          - type: unique
        tests:
          - not_null
  - name: person
    columns:
      - name: uuid
        constraints:
          - type: foreign_key
            expression: " (uuid)"
  - name: place
    columns:
      - name: uuid
        tests:
          - not_null
