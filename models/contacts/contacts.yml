version: 1

models:
  - name: contact
    config:
      contract:
        enforced: true
    columns:
      - name: uuid
        constraints:
          - type: unique
        tests:
          - not_null
  - name: person
    columns:
      - name: uuid
        tests:
          - not_null
  - name: place
    columns:
      - name: uuid
        tests:
          - not_null
