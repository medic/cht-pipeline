version: 1

models:
  - name: contact
    columns:
      - name: uuid
        constraints:
          - type: unique
        tests:
          - not_null
  - name: person
    config:
      contract:
        enforced: true
    columns:
      - name: uuid
        data_type: string
        constraints:
          - type: foreign_key
            expression: "{{ env_var('POSTGRES_SCHEMA') }}.contact (uuid) ON DELETE CASCADE"
        tests:
          - not_null
      - name: _timestamp
        data_type: timestamp
      - name: date_of_birth
        data_type: string
      - name: sex
        data_type: string
  - name: place
    columns:
      - name: uuid
        tests:
          - not_null
